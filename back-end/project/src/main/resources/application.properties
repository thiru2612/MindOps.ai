# ── Spring Core & Database Setup ──
spring.application.name=mindops-cloud

# spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
# spring.datasource.username=${DB_USER}
# spring.datasource.password=${DB_PASSWORD}
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=jdbc:mysql://localhost:3306/mindops_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=mindops_user
spring.datasource.password=122131
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hikari Connection Pool (Operational Excellence) ──
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=MindOpsHikariPool

# ── JPA & Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# ── Jackson (JSON Serialization) ──
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── Server & Error Handling (Security) ──
server.port=8080
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ── MindOps Custom App Properties ──
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.expiry-ms=${JWT_EXPIRY_MS}
app.security.jwt.refresh-secret=${JWT_REFRESH_SECRET}
app.security.jwt.refresh-expiry-ms=${JWT_REFRESH_EXPIRY_MS}

app.encryption.key=${MINDOPS_ENCRYPTION_KEY}

app.gemini.api-key=${GEMINI_API_KEY}
# app.gemini.endpoint=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
# app.gemini.endpoint=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent
app.gemini.endpoint=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
app.gemini.timeout-seconds=30

app.rate-limit.deployment-generate.requests-per-hour=10

app.admin.email=${MINDOPS_ADMIN_EMAIL}
app.admin.password=${MINDOPS_ADMIN_PASSWORD}

# ── Logging ──
logging.level.root=INFO
# logging.level.com.mindops=DEBUG
logging.level.org.hibernate.SQL=WARN


# ── Async Task Executor (Phase 4 Deployment Engine) ──
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=mindops-async-

# ── Logging ──
logging.level.com.ai.project=DEBUG


# ── FinOps Configuration (Phase 6) ──
spring.mvc.async.request-timeout=60000
app.finops.azure.pricing-api-url=https://prices.azure.com/api/retail/prices
app.finops.azure.pricing-api-timeout-seconds=10
app.finops.azure.hours-per-month=730